<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duncan Fashion Store</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

header{
    background:#000;
    color:#FFD700;
    padding:40px;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.card{
    background:#222;
    width:250px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(255,215,0,0.3);
}

.card h3{
    color:#FFD700;
}

.price{
    font-size:22px;
    font-weight:bold;
    color:#25D366;
}

.button{
    display:inline-block;
    background:#FFD700;
    color:black;
    text-decoration:none;
    padding:12px 25px;
    border-radius:6px;
    font-weight:bold;
    margin-top:15px;
}

.button:hover{
    background:#FFC107;
}

footer{
    background:#000;
    padding:20px;
    margin-top:30px;
}
</style>

</head>

<body>

<header>

<h1>🛍️ Duncan Fashion Store</h1>

<p>Quality Fashion • Affordable Prices • Modern Style</p>

</header>

<section class="products">

<div class="card">
<h3>👕 Premium T-Shirt</h3>
<p class="price">KSh 1,200</p>
<a href="#" class="button">Buy Now</a>
</div>

<div class="card">
<h3>👟 Running Shoes</h3>
<p class="price">KSh 4,500</p>
<a href="#" class="button">Buy Now</a>
</div>

<div class="card">
<h3>⌚ Luxury Watch</h3>
<p class="price">KSh 3,800</p>
<a href="#" class="button">Buy Now</a>
</div>

<div class="card">
<h3>🧥 Hooded Jacket</h3>
<p class="price">KSh 2,800</p>
<a href="#" class="button">Buy Now</a>
</div>

</section>

<footer>

<p>© 2026 Duncan Fashion Store</p>

</footer>

</body>
</html>
